<div class="fp-wrapper">
  <div class="fp-card">
    <a routerLink="/login" class="back-link">← Back to Login</a>

    @if (!success()) {
      <div class="fp-header">
        <div class="fp-icon">🔑</div>
        <h2>Reset Password</h2>
        <p>Enter your username and set a new password</p>
      </div>

      <form class="fp-form" (ngSubmit)="onSubmit()" novalidate>
        <div class="form-group">
          <label class="form-label">Username</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" class="form-input" placeholder="Your username"
              [(ngModel)]="username" name="username" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input [type]="showPassword() ? 'text' : 'password'"
              class="form-input form-input--with-toggle" placeholder="Min 6 characters"
              [(ngModel)]="newPassword" name="newPassword" />
            <button type="button" class="password-toggle" (click)="showPassword.update(v=>!v)">
              {{ showPassword() ? '🙈' : '👁️' }}
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input [type]="showPassword() ? 'text' : 'password'"
              class="form-input" placeholder="Re-enter new password"
              [(ngModel)]="confirmPwd" name="confirmPwd" />
          </div>
        </div>

        @if (formError()) {
          <div class="form-error-banner"><span>⚠️</span> {{ formError() }}</div>
        }

        <button type="submit" class="btn-primary" [disabled]="loading()">
          @if (loading()) { <span class="spinner"></span> Resetting... }
          @else { Reset Password }
        </button>
      </form>
    } @else {
      <div class="success-state">
        <div class="success-icon">✅</div>
        <h2>Password Reset!</h2>
        <p>Your password has been updated successfully.</p>
        <a routerLink="/login" class="btn-primary" style="text-decoration:none; text-align:center;">
          Go to Login →
        </a>
      </div>
    }
  </div>
</div>
