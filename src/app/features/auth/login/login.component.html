<div class="auth-page">

  <!-- Brand bar -->
  <div class="auth-brand">
    <span class="auth-brand__icon">⏱</span>
    <span class="auth-brand__name">Timesheet Management</span>
  </div>

  <!-- Center card -->
  <div class="auth-center">
    <div class="auth-card">

      <div class="auth-card__top">
        <div class="auth-card__avatar">TM</div>
        <h1 class="auth-card__title">Welcome back</h1>
        <p class="auth-card__sub">Sign in to your account</p>
      </div>

      <form class="auth-form" (ngSubmit)="onSubmit()" novalidate>

        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input id="username" type="text" class="form-input"
            placeholder="Enter your username"
            [(ngModel)]="username" name="username"
            autocomplete="username" [disabled]="loading()" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-pw">
            <input id="password" [type]="showPassword() ? 'text' : 'password'"
              class="form-input"
              placeholder="Enter your password"
              [(ngModel)]="password" name="password"
              autocomplete="current-password" [disabled]="loading()" />
            <button type="button" class="pw-toggle" (click)="togglePassword()">
              {{ showPassword() ? '🙈' : '👁️' }}
            </button>
          </div>
        </div>

        <div class="form-meta">
          <label class="check-label">
            <input type="checkbox" [checked]="rememberMe()"
              (change)="rememberMe.set($any($event.target).checked)" />
            <span>Remember me</span>
          </label>
          <a routerLink="/forgot-password" class="meta-link">Forgot password?</a>
        </div>

        @if (formError()) {
          <div class="form-error-banner">⚠️ {{ formError() }}</div>
        }

        <button type="submit" class="btn-submit" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner"></span> Signing in...
          } @else {
            Sign In
          }
        </button>

      </form>

      <p class="auth-card__footer">
        Don't have an account?
        <a routerLink="/register" class="footer-link">Create one</a>
      </p>

    </div>

    <!-- Feature pills below card -->
    <div class="auth-features">
      <span class="feat-pill">✅ Timesheets</span>
      <span class="feat-pill">📅 Leave</span>
      <span class="feat-pill">🕐 Attendance</span>
      <span class="feat-pill">📊 Reports</span>
    </div>
  </div>

</div>
